server:
  port: 8080

spring:
  application:
    name: food-recipe-server
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:mysql://mysql:3306/food_recipe?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: FoodRecipe123!
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.foodrecipe.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# JWT配置（密钥长度必须 >= 64 字符，用于 HS512 算法）
jwt:
  secret: FoodRecipeJwtSecretKey2024ForProductionUseOnlyThisKeyMustBeAtLeast64CharactersLong
  expiration: 86400000

# 微信小程序配置（请修改为真实的AppID和Secret）
wx:
  appid: wx1234567890abcdef
  secret: your_wx_app_secret_here

# 阿里云OSS配置（可选，不配置则图片上传功能不可用）
# aliyun:
#   oss:
#     endpoint: oss-cn-hangzhou.aliyuncs.com
#     accessKeyId: your_access_key_id
#     accessKeySecret: your_access_key_secret
#     bucketName: your_bucket_name
#     domain: https://your_bucket_name.oss-cn-hangzhou.aliyuncs.com

# Moonshot AI 配置（可选，不配置则AI识别使用默认结果）
# moonshot:
#   api:
#     key: your_moonshot_api_key
#     url: https://api.moonshot.cn/v1/chat/completions

# 日志
logging:
  level:
    root: INFO
    com.foodrecipe: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
